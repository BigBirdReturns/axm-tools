<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1250" viewBox="0 0 1800 1250">
<title>Source residue atlas</title>
<desc>Original analytical traces of construction habits observed in the cited SNES, Genesis, and GBA sprite archives. No source sprite pixels are reproduced.</desc>
<style>
.t{font-family:ui-monospace,monospace;fill:#ece7d8}.h{font-size:25px;fill:#14cddc}.st{font-size:15px;fill:#8f9a98}.ph{font-size:17px}.ps{font-size:12px;fill:#8f9a98}.tag{font-size:13px;fill:#dc9141}.body{stroke:#ece7d8;stroke-width:8;stroke-linecap:square;stroke-linejoin:miter;fill:none}.rule{stroke:#293033}.thin{stroke-width:4}.mini{stroke-width:3}.dark{fill:#080909;stroke:#080909}.cream{fill:#f0e7bd;stroke:#f0e7bd}.none{fill:none}
</style>
<rect width="1800" height="1250" fill="#07090a"/>
<text x="34" y="43" class="t h">SOURCE RESIDUE ATLAS · VISUAL TRACES FROM THE SPRITE ARCHIVES</text>
<text x="34" y="72" class="t st">Analytical traces, not source copies. Each panel records a source-specific construction habit after character geometry is removed.</text>
