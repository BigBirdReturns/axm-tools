<line x1="28" y1="905" x2="1772" y2="905" class="rule"/><text x="34" y="943" class="t h" style="font-size:19px">WHAT THE SITE ACTUALLY CONTRIBUTED</text>
<text x="40" y="985" class="t tag">LAUNCH OCTOPUS</text><text x="40" y="1008" class="t st">pose-space diversity; independent limbs; palette-isolated state rows</text>
<text x="40" y="1048" class="t tag">G&amp;W OCTOPUS</text><text x="40" y="1071" class="t st">recognition through silhouette and negative space; minimal internal information</text>
<text x="40" y="1111" class="t tag">SONIC 2 BADNIKS</text><text x="40" y="1134" class="t st">asset families grouped by context; reusable modules; explicit palette strips</text>
<text x="930" y="985" class="t tag">SIMCITY BUDGET</text><text x="930" y="1008" class="t st">complete screen beside extracted controls, glyphs, arrows, and pointer modules</text>
<text x="930" y="1048" class="t tag">SIMCITY MAP / UI</text><text x="930" y="1071" class="t st">terrain is a planar network of routes, junctions, zones, overlays, and gaps</text>
<text x="930" y="1111" class="t tag">SIMCITY DEBUG</text><text x="930" y="1134" class="t st">wrongness comes from intact modules coexisting, not random image destruction</text>
</svg>
