# Regression harness for acceptance.html — the buyer-facing AXM Readiness demo.
#
# The production page is modular and served through GitHub Pages. The browser
# harness starts a loopback-only HTTP server, drives the real UI, and rejects
# requests outside that local origin. See tests/pages/verify_acceptance.mjs.

name: Acceptance page

on:
  push:
  pull_request:

jobs:
  acceptance-page:
    name: Acceptance page (headless browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright + Chromium
        run: |
          npm install --no-save playwright@1 >/tmp/acceptance-npm-install.log 2>&1
          npx playwright install --with-deps chromium >/tmp/acceptance-browser-install.log 2>&1

      - name: Drive acceptance.html and assert the intake rules
        run: node tests/pages/verify_acceptance.mjs
