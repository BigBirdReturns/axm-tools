# Regression harness for acceptance.html — the buyer-facing intake demo.
#
# The page is pure client-side JS in one offline file, so its logic only
# exists in the browser: the honest test drives the real page headless and
# asserts the intake rules' observable behavior (worked-example verdicts,
# the dependency-free XLSX reader, the honesty boundary, zero network
# requests). See tests/pages/verify_acceptance.mjs.

name: Acceptance page

on:
  push:
  pull_request:

jobs:
  acceptance-page:
    name: Acceptance page (headless browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright + Chromium
        run: |
          npm install --no-save playwright@1
          npx playwright install --with-deps chromium

      - name: Drive acceptance.html and assert the intake rules
        run: node tests/pages/verify_acceptance.mjs
