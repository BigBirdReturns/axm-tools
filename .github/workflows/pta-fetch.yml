name: PTA tracker nightly fetch

on:
  schedule:
    # 12:30 UTC = 4:30/5:30 AM Pacific, before anyone checks the page
    - cron: "30 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch and filter feeds
        run: python pta-tracker/scripts/fetch.py

      - name: Commit updated data
        run: |
          git config user.name "pta-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add pta-tracker/data/items.json
          if git diff --cached --quiet; then
            echo "No new items."
          else
            git commit -m "pta-tracker: nightly data refresh"
            git push
          fi
